 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat + Shred App</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Responsive Phone */
.phone {
    width: 100%;
    max-width: 400px;
    height: 100vh;
    max-height: 700px;
    background: white;
    border-radius: 20px;
    box-shadow: 0 0 20px rgba(0,0,0,0.2);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
}

/* Header */
.header {
    background: #2c2f36;
    color: white;
    padding: 12px;
    text-align: center;
    font-size: 16px;
}

/* Chat */
.chat-box {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
}

.message {
    background: #e0e0e0;
    padding: 10px;
    margin: 5px 0;
    border-radius: 10px;
    max-width: 70%;
    word-wrap: break-word;
}

.me {
    background: #2c2f36;
    color: white;
    align-self: flex-end;
}

/* Input */
.input-area {
    display: flex;
    padding: 10px;
    border-top: 1px solid #ccc;
}

input {
    flex: 1;
    padding: 10px;
    font-size: 14px;
}

button {
    margin-left: 5px;
    padding: 10px;
    background: #2c2f36;
    color: white;
    border: none;
    cursor: pointer;
}

/* Overlay */
.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

.box {
    background: #3a3f47;
    color: white;
    padding: 15px 25px;
    border-radius: 8px;
    animation: shake 0.1s infinite alternate;
}

/* Shred lines */
.shred {
    margin-top: 10px;
    display: flex;
    gap: 2px;
}

.shred div {
    width: 3px;
    height: 40px;
    background: white;
    animation: drop 0.5s infinite;
}

/* Animations */
@keyframes shake {
    from { transform: translateX(-3px); }
    to { transform: translateX(3px); }
}

@keyframes drop {
    0% { height: 40px; }
    50% { height: 10px; }
    100% { height: 40px; }
}

/* Mobile full screen */
@media (max-width: 500px) {
    .phone {
        border-radius: 0;
        height: 100vh;
        max-height: none;
    }
}
</style>
</head>

<body>

<div class="phone">

    <div class="header">Secure Chat</div>

    <div class="chat-box" id="chatBox"></div>

    <div class="input-area">
        <input type="text" id="msg" placeholder="Type message...">
        <button onclick="sendMsg()">Send</button>
        <button onclick="startShred()">Exit</button>
    </div>

    <div class="overlay" id="overlay">
        <div class="box">Shredding Chats...</div>
        <div class="shred">
            <div></div><div></div><div></div><div></div>
            <div></div><div></div><div></div><div></div>
        </div>
    </div>

</div>

<script>
const input = document.getElementById("msg");

/* ENTER KEY SUPPORT */
input.addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        sendMsg();
    }
});

function sendMsg() {
    const text = input.value.trim();
    if (!text) return;

    const chatBox = document.getElementById("chatBox");

    const msgDiv = document.createElement("div");
    msgDiv.className = "message me";
    msgDiv.innerText = text;

    chatBox.appendChild(msgDiv);
    chatBox.scrollTop = chatBox.scrollHeight;

    input.value = "";
}

function startShred() {
    const overlay = document.getElementById("overlay");
    const chatBox = document.getElementById("chatBox");

    overlay.style.display = "flex";

    setTimeout(() => {
        chatBox.innerHTML = "";
        overlay.style.display = "none";
        alert("All chats shredded!");
    }, 3000);
}
</script>

</body>
</html>
